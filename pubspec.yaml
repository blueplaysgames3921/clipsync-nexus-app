name: clipsync_nexus
description: Advanced clipboard management for high-volume data handling.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Database — FTS5 is built into sqflite, no extra package needed
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.3        # Windows desktop SQLite
  path: ^1.9.0
  path_provider: ^2.1.3

  # Encryption
  flutter_secure_storage: ^9.2.2
  encrypt: ^5.0.3
  pointycastle: ^3.9.1
  crypto: ^3.0.3

  # Clipboard
  super_clipboard: ^0.8.7           # Rich clipboard (images, files, RTF)

  # OCR
  google_mlkit_text_recognition: ^0.13.0   # On-device OCR Android
  flutter_tesseract_ocr: ^0.4.12           # Windows OCR fallback

  # Search & embeddings
  ml_linalg: ^14.4.3                # Vector math for semantic scoring
  langchain: ^0.7.3                 # Embedding pipeline
  langchain_ollama: ^0.3.2          # Local LLM for summarize/translate

  # Networking (Teleport)
  nsd: ^5.0.1                       # mDNS/DNS-SD discovery
  network_info_plus: ^5.0.0
  shelf: ^1.4.1                     # Local HTTPS server (Teleport receiver)
  shelf_router: ^1.1.4
  http: ^1.2.1

  # UI
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  reorderables: ^0.6.0              # Drag reorder (scratchpad / stack)

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^9.0.0
  file_picker: ^8.1.2
  permission_handler: ^11.3.1
  device_info_plus: ^10.1.2
  connectivity_plus: ^6.0.3
  rxdart: ^0.28.0
  collection: ^1.18.0
  convert: ^3.1.1
  image: ^4.2.0                     # Image manipulation / thumbnail gen
  mime: ^1.0.5
  exif: ^3.3.0                      # EXIF stripping

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.4
  build_runner: ^2.4.9
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/icons/
  fonts:
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Medium.ttf
          weight: 500
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
